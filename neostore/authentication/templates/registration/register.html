{% extends 'base.html' %}
{% block content %}
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Регистрация</h2>
                    <form method="post">
                        {% csrf_token %}
                        {% if error %}
                            <div class="alert alert-danger">{{ error }}</div>
                        {% endif %}
                        
                        {% for field in form %}
                            <div class="mb-4 text-center">
                                <label class="form-label fw-medium d-block">{{ field.label }}</label>
                                <div style="max-width: 300px; margin: 0 auto;">
                                    {{ field }}
                                </div>
                                {% if field.errors %}
                                    <div class="text-danger small mt-1">
                                        {{ field.errors }}
                                    </div>
                                {% endif %}
                            </div>
                        {% endfor %}
                        
                        <button type="submit" class="btn btn-success w-100 py-2">Создать аккаунт</button>
                    </form>
                    <div class="text-center mt-3">
                        <small class="text-muted">Уже есть аккаунт? <a href="{% url 'login' %}">Войдите здесь</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

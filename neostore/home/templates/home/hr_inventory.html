{% extends 'base.html' %}
{% block content %}
    <h1>Inventory Management</h1>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Available Items</h3>
        <a href="#" class="btn btn-primary">Add New Item</a>
    </div>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for thing in things %}
                <tr>
                    <td><img src="{{ thing.photo_url }}" width="50"></td>
                    <td>{{ thing.name }}</td>
                    <td>{{ thing.value }}</td>
                    <td>{{ thing.amount }}</td>
                    <td><a href="#" class="btn btn-sm btn-secondary">Edit</a></td>
                </tr>
            {% empty %}
                <tr><td colspan="5">No items in inventory.</td></tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}

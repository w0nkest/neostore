{% extends 'base.html' %}
{% block content %}
    <div class="text-center mt-5">
        <h1>Добро пожаловать в Neo Store</h1>
        <p class="lead">Зарабатывайте корпоративную валюту, достигая целей, и тратьте её на классные подарки!</p>
        <div class="mt-4">
            {% if user.is_authenticated %}
                <a href="{% url 'employee-dashboard' %}" class="btn btn-primary btn-lg">Перейти в панель</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-primary btn-lg">Войдите чтобы начать</a>
            {% endif %}
        </div>
    </div>
{% endblock %}

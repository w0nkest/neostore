{% extends 'base.html' %}
{% block content %}
    <div class="card shadow-sm p-4">
        <div class="text-center">
            <img src="https://ui-avatars.com/api/?name={{ user.username }}&size=128" class="rounded-circle mb-3">
            <h1>{{ user.get_full_name|default:user.username }}</h1>
            <p class="text-muted">{{ user.email }}</p>
        </div>
        <hr>
        <div class="row text-center">
            <div class="col-md-4">
                <h5>Current Balance</h5>
                <p class="fs-3 fw-bold">{{ user.wallet.money }} <small>NeoCoins</small></p>
            </div>
            <div class="col-md-4">
                <h5>Date of Birth</h5>
                <p class="fs-5">{{ user.date_birth }}</p>
            </div>
            <div class="col-md-4">
                <h5>Role</h5>
                <p class="fs-5">{{ "HR Manager" if user.is_hr else "Employee" }}</p>
            </div>
        </div>
    </div>
{% endblock %}
